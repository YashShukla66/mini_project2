<!DOCTYPE html>
<html>

<head>

    <title>Marks Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #5f6dfc, #b224ef);
        }

        .card {
            width: 450px;
            padding: 30px;
        }
    </style>

</head>

<body>

    <div class="card">

        <h4 class="text-center mb-3">Welcome {{name}}</h4>

        <p class="text-center">Roll No: {{rollno}}</p>

        <p class="text-center">Course: {{course}}</p>

        <form method="POST">

            <div class="mb-3">
                <label>Math Score</label>
                <input type="number" name="math" class="form-control" min="0" max="100" required>
            </div>

            <div class="mb-3">
                <label>Coding Score</label>
                <input type="number" name="coding" class="form-control" min="0" max="100" required>
            </div>

            <div class="mb-3">
                <label>IoT Score</label>
                <input type="number" name="iot" class="form-control" min="0" max="100" required>
            </div>

            <button id="predictBtn" class="btn btn-success w-100">
                Predict Performance
            </button>

        </form>


        <!-- LOADING SPINNER -->

        <div id="loading" class="text-center mt-3" style="display:none;">

            <div class="spinner-border text-primary"></div>

            <p class="mt-2 fw-bold">AI is analyzing student performance...</p>

        </div>


        <!-- RESULT -->

        {% if result %}

        <div id="resultBox"
            class="alert {% if result == 'Good Performance' %}alert-success{% else %}alert-danger{% endif %} text-center mt-4">

            <h4>Prediction Result</h4>

            <h3>{{result}}</h3>

        </div>

        {% endif %}

    </div>

    <script>

        document.querySelector("form").addEventListener("submit", function (e) {

            e.preventDefault()

            document.getElementById("loading").style.display = "block"

            document.getElementById("predictBtn").disabled = true

            // hide old result
            let resultBox = document.getElementById("resultBox")

            if (resultBox) {
                resultBox.style.display = "none"
            }

            setTimeout(() => {

                e.target.submit()

            }, 3000)

        })

    </script>

</body>

</html>
