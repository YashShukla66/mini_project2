<!DOCTYPE html>
<html>

<head>

<title>Student Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#5f6dfc,#b224ef);
}

.card{
width:400px;
padding:30px;
}

</style>

</head>

<body>

<div class="card">

<h3 class="text-center mb-4">Student Information</h3>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input type="text" name="name" class="form-control" required>

</div>

<div class="mb-3">

<label>University Roll No</label>

<input type="text" name="rollno" class="form-control" required>

</div>

<div class="mb-3">

<label>Course</label>

<select name="course" class="form-control">

<option>None</option>
<option>BTech</option>
<option>BCA</option>
<option>MCA</option>

</select>

</div>

<button class="btn btn-primary w-100">

Next →

</button>

</form>

</div>

</body>

</html>
